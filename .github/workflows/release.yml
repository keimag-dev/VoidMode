name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Application
        run: dotnet publish VoidMode/VoidMode.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish

      - name: Compile Inno Setup Installer
        uses: jsconvergence/innosetup-action@v1
        with:
          iss-file: installer/voidmode.iss
          install-dir: ./publish
        # Inno Setup Actionの仕様に基づき、出力先を制御
        # outputsは自動的に Artifacts に保存される

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.innosetup.outputs.installer }}
            ./publish/VoidMode.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
