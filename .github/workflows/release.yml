name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Application
        run: dotnet publish VoidMode/VoidMode.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          # Inno Setupのコンパイラパスを特定して実行
          # 通常、Chocolateyでインストールするとパスが通りますが、明示的に呼び出します
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O"./publish" installer/voidmode.iss

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/VoidModeInstaller.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
