name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Application
        shell: pwsh
        run: |
          dotnet publish VoidMode/VoidMode.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o ./publish

      - name: Prepare artifacts directory
        shell: pwsh
        run: |
          Get-ChildItem -Path ./publish -Filter *.pdb -Recurse -ErrorAction SilentlyContinue | Remove-Item -Force
          Get-ChildItem -Path ./publish -Filter *.xml -Recurse -ErrorAction SilentlyContinue | Remove-Item -Force
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/voidmode.iss

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/VoidModeInstaller.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
